<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paire Review</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("paire-ui-theme");
          const theme =
            storedTheme === "light" ||
            storedTheme === "dark" ||
            storedTheme === "system"
              ? storedTheme
              : "system";
          const resolvedTheme =
            theme === "system"
              ? matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;

          document.documentElement.classList.add(resolvedTheme);
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
